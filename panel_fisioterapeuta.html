<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel del Fisioterapeuta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body{
            background:#eef5ff;
            font-family:'Segoe UI',sans-serif;
        }

        .hero{
            background:linear-gradient(135deg,#6fa8ff,#9b7bff);
            color:white;
            padding:35px;
            border-radius:0 0 30px 30px;
            margin-bottom:30px;
        }

        .card{
            border:none;
            border-radius:20px;
            box-shadow:0 8px 25px rgba(0,0,0,.08);
        }

        .numero{
            font-size:40px;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="hero">

    <h2>Panel del Fisioterapeuta</h2>

    <p>
        Resumen general del estado de los pacientes.
    </p>

</div>

<div class="container">

<div class="row g-4">

<div class="col-md-3">

<div class="card p-4 text-center">

<h6>Pacientes</h6>

<div class="numero text-primary">

{{ total_pacientes }}

</div>

</div>

</div>

<div class="col-md-3">

<div class="card p-4 text-center">

<h6>Evaluaciones</h6>

<div class="numero text-success">

{{ total_evaluaciones }}

</div>

</div>

</div>

<div class="col-md-3">

<div class="card p-4 text-center">

<h6>Promedio recuperación</h6>

<div class="numero text-info">

{{ promedio }}%

</div>

</div>

</div>

<div class="col-md-3">

<div class="card p-4 text-center">

<h6>Pacientes en riesgo</h6>

<div class="numero text-danger">

{{ pacientes_riesgo }}

</div>

</div>

</div>

</div>

<br>

<div class="card p-4">

<h4>Evolución general</h4>

<canvas id="grafica"></canvas>

</div>

</div>

<script>

const ctx=document.getElementById('grafica');

new Chart(ctx,{

type:'bar',

data:{

labels:[
'Dolor',
'Movilidad',
'Fuerza',
'Cumplimiento'
],

datasets:[{

label:'Promedio',

data:[

{{ promedio_dolor }},

{{ promedio_movilidad }},

{{ promedio_fuerza }},

{{ promedio_cumplimiento }}

],

backgroundColor:[
'#ff6b6b',
'#4dabf7',
'#51cf66',
'#9775fa'
]

}]

},

options:{

responsive:true,

plugins:{

legend:{
display:false
}

}

}

});

</script>

</body>
</html>
